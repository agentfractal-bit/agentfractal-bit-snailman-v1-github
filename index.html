<!doctype html><html><head><meta charset='utf-8'><title>Snailman v0</title><style>body{background:#0b1020;color:#eaf0ff;font-family:system-ui;text-align:center}canvas{background:#111a2b;border:2px solid #2d3f66;image-rendering:pixelated}</style></head><body><h2>🌀 Snailman v0</h2><canvas id='c' width='560' height='560'></canvas><p id='h'></p><p>Arrows/WASD to move • R to restart</p><script>const c=document.getElementById('c'),x=c.getContext('2d'),h=document.getElementById('h');const N=20,S=28,w=new Set();for(let i=0;i<N;i++){w.add(`${i},0`);w.add(`${i},${N-1}`);w.add(`0,${i}`);w.add(`${N-1},${i}`)}for(let i=3;i<17;i++)if(i!==10)w.add(`10,${i}`);let p={x:2,y:2,d:{x:1,y:0}},e={x:17,y:17},score=0,over=0,win=0;let dots=new Set();for(let y=1;y<N-1;y++)for(let x0=1;x0<N-1;x0++)if(!w.has(`${x0},${y}`))dots.add(`${x0},${y}`);addEventListener('keydown',k=>{k=k.key.toLowerCase();if(k=='arrowup'||k=='w')p.d={x:0,y:-1};if(k=='arrowdown'||k=='s')p.d={x:0,y:1};if(k=='arrowleft'||k=='a')p.d={x:-1,y:0};if(k=='arrowright'||k=='d')p.d={x:1,y:0};if(k=='r'&&(over||win))location.reload()});const mv=(o,d)=>{let nx=o.x+d.x,ny=o.y+d.y;if(!w.has(`${nx},${ny}`)){o.x=nx;o.y=ny}};function ai(){let ds=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].filter(d=>!w.has(`${e.x+d.x},${e.y+d.y}`));ds.sort((a,b)=>(Math.abs(e.x+a.x-p.x)+Math.abs(e.y+a.y-p.y))-(Math.abs(e.x+b.x-p.x)+Math.abs(e.y+b.y-p.y)));mv(e,Math.random()<.75?ds[0]:ds[(Math.random()*ds.length)|0])}function draw(){x.clearRect(0,0,560,560);for(const z of w){let[a,b]=z.split(',').map(Number);x.fillStyle='#2b3f6d';x.fillRect(a*S,b*S,S,S)}for(const d of dots){let[a,b]=d.split(',').map(Number);x.fillStyle='#ffd86b';x.beginPath();x.arc(a*S+14,b*S+14,3,0,7);x.fill()}x.fillStyle='#7df0d5';x.fillRect(p.x*S,p.y*S,S,S);x.fillStyle='#ff6f6f';x.fillRect(e.x*S,e.y*S,S,S);h.textContent=(win?'You win! ':over?'Game over! ':'')+`Score ${score} • left ${dots.size}`+(win||over?' • press R':'')}function tick(){if(over||win)return draw();mv(p,p.d);let k=`${p.x},${p.y}`;if(dots.has(k)){dots.delete(k);score++}ai();if(p.x==e.x&&p.y==e.y)over=1;if(dots.size==0)win=1;draw()}setInterval(tick,170);draw();</script></body></html>
